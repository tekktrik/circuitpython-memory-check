name: 'CircuitPython Memory Check'
description: 'Import a CircuitPython library and check the amount of RAM used'
inputs:
  version:
    description: 'Version of CircuitPython to simulate'
    required: true
    default: main
  circuitpython-folder:
    description: 'Folder name to use for the CircuitPython checkout'
    required: true
    default: 'cpysim'
outputs:
  memory-table:
    description: 'The amount of memory used by importing, as a table'
    value: TBD
runs:
  using: "composite"
  steps:
    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: Checkout the repository
      uses: actions/checkout@v6
    - name: Make CIRCUITPY drive
      shell: bash
      run: |
        mkdir CIRCUITPY
        mkdir CIRCUITPY/lib
    - name: Copy library to drive
      shell: bash
      run: python ${{ github.action_path }}/scripts/copy.py
    - name: Download circup
      shell: bash
      run: pipx install circup
    - name: Copy library dependencies to CIRCUITPY
      shell: bash
      run: circup --path CIRCUITPY install -r requirements.txt
    - name: Prepare nativesim environment
      uses: tekktrik/simulate-circuitpython-nativesim@v1
    - name: Download simulator library
      shell: bash
      run: pip install simulate-circuitpython-nativesim
    - name: Run analysis
      shell: bash
      run: python ${{ github.action_path }}/scripts/analyze.py
    