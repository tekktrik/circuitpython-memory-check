name: 'CircuitPython Memory Check'
description: 'Import a CircuitPython library and check the amount of RAM used'
inputs:
  version:
    description: 'Version of CircuitPython to simulate'
    required: true
    default: main  # This should be "latest" eventually, and version autodetected
  circuitpython-folder:
    description: 'Folder name to use for the CircuitPython checkout'
    required: true
    default: 'cpysim'
outputs:
  memory-table:
    description: 'The amount of memory used by importing, as a table'
    value: TBD
runs:
  using: "composite"
  steps:
    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Checkout the repository
      uses: actions/checkout@v6
    - name: Setup system dependencies
      uses: tekktrik/simulate-circuitpython-nativesim/prepare-system@main
    - name: Build nativesim firmware
      uses: tekktrik/simulate-circuitpython-nativesim/build-firmware@main
      with:
        # TODO: Change this to use given or autodetected version
        version: 10.1.4
        firmware-filepath: ./firmware.exe
    - name: Find imports
      id: find-imports
      shell: bash
      run: |
        IMPORTS_FOUND=$(python ${{ github.action_path }}/scripts/find_imports.py)
        echo "imports-found=$IMPORTS_FOUND" >> "$GITHUB_OUTPUT"
    - name: Copy library to drive
      shell: bash
      run: python ${{ github.action_path }}/scripts/copy_library.py
    - name: Download circup
      shell: bash
      run: pipx install circup
    - name: Copy library dependencies to CIRCUITPY
      shell: bash
      # TODO: Change this to use given or autodetected version
      run: |
        circup \
        --path CIRCUITPY \
        --cpy-version 10.1.4 \
        --board-id raspberry-pi-pico \
        install \
        -r requirements.txt
    - name: Make firmware executable
      shell: bash
      run: chmod +x firmware.exe
    - name: Install simulator
      shell: bash
      # Either use PyPI or tag to pin
      run: pip install git+https://github.com/tekktrik/simulate-circuitpython-nativesim@main
    - name: Run simulator via script
      shell: bash
      run: |
        python ${{ github.action_path }}/scripts/check_memory.py \
        firmware.exe \
        flash.bin \
        CIRCUITPY \
        ${{ toJson(steps.find-imports.outputs.imports-found) }}
    